apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress
  namespace: codeflix
  labels:
    app: codeflix
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/proxy-busy-buffers-size: "16k"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /realms/
            pathType: Prefix
            backend:
              service:
                name: keycloak-service
                port:
                  number: 8080
          - path: /admin/
            pathType: Prefix
            backend:
              service:
                name: keycloak-service
                port:
                  number: 8080
          - path: /resources/
            pathType: Prefix
            backend:
              service:
                name: keycloak-service
                port:
                  number: 8080
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: admincatalog
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: front-service
                port:
                  number: 80